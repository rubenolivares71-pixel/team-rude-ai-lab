name: CI

on:
  pull_request:
  push:
    branches: ["main", "work"]

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Basic repository checks
        run: |
          test -f README.md
          test -d docs
          test -d apps
          test -d ai
          test -d infra
